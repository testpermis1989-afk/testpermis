<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permis Maroc - Chargement...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      width: 140px;
      height: 140px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
    }
    @keyframes pulse-glow {
      0%, 100% { 
        transform: scale(1);
        filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
      }
      50% { 
        transform: scale(1.04);
        filter: drop-shadow(0 12px 40px rgba(0,100,255,0.3));
      }
    }
    h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-bottom: 30px;
    }
    .spinner-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 0 auto 20px;
    }
    .spinner-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f0c040;
      animation: bounce-dot 1.4s ease-in-out infinite;
    }
    .spinner-dot:nth-child(2) { animation-delay: 0.16s; }
    .spinner-dot:nth-child(3) { animation-delay: 0.32s; }
    .spinner-dot:nth-child(4) { animation-delay: 0.48s; }
    @keyframes bounce-dot {
      0%, 80%, 100% { 
        transform: scale(0.4);
        opacity: 0.3;
      }
      40% { 
        transform: scale(1);
        opacity: 1;
      }
    }
    .status {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
    }
    .version {
      position: fixed;
      bottom: 10px;
      right: 15px;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="icon-transparent.png" alt="Permis Maroc">
    </div>
    <h1>Permis Maroc</h1>
    <p class="subtitle">اختبار رخصة القيادة - Test du Permis de Conduire</p>
    <div class="spinner-wrapper">
      <div class="spinner-dot"></div>
      <div class="spinner-dot"></div>
      <div class="spinner-dot"></div>
      <div class="spinner-dot"></div>
    </div>
    <p class="status">Démarrage de l'application...</p>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
