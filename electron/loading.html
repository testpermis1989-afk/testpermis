<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permis Maroc - Chargement...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #e0e0e0 0%, #c0c0c0 50%, #d0d0d0 100%);
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .logo span {
      font-size: 40px;
      font-weight: bold;
      color: white;
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0,0,0,0.1);
      border-top: 4px solid #f39c12;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status {
      color: #888;
      font-size: 14px;
    }
    .version {
      position: fixed;
      bottom: 10px;
      right: 15px;
      color: #aaa;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span>PM</span>
    </div>
    <h1>Permis Maroc</h1>
    <p class="subtitle">اختبار رخصة القيادة - Test du Permis de Conduire</p>
    <div class="spinner"></div>
    <p class="status">Démarrage de l'application...</p>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
