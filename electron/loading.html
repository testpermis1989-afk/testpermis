<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permis Maroc - Chargement...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-bottom: 30px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top: 3px solid #f0c040;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
    }
    .version {
      position: fixed;
      bottom: 10px;
      right: 15px;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="icon.ico" alt="PM" />
    </div>
    <h1>Permis Maroc</h1>
    <p class="subtitle">اختبار رخصة القيادة - Test du Permis de Conduire</p>
    <div class="spinner"></div>
    <p class="status">Démarrage de l'application...</p>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
