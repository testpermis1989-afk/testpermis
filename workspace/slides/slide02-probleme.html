<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0B1622; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  background: #0B1622;
}
.header {
  padding: 24pt 50pt 14pt 50pt;
}
.accent-line {
  background: #C1272D;
  width: 40pt; height: 3pt;
  margin-bottom: 12pt;
}
.cols {
  display: flex; flex: 1; padding: 0 50pt 20pt 50pt; gap: 30pt;
}
.col-left { width: 50%; display: flex; flex-direction: column; justify-content: center; }
.col-right { width: 50%; display: flex; align-items: center; justify-content: center; }
.stat-box {
  background: rgba(55,220,242,0.08);
  border-left: 3pt solid #37DCF2;
  padding: 10pt 14pt;
  margin-bottom: 8pt;
  border-radius: 0 6pt 6pt 0;
}
</style>
</head>
<body>
<div class="header">
  <div class="accent-line"></div>
  <h1 style="color: #FFFFFF; font-size: 26pt; margin: 0 0 6pt 0;">LE CONSTAT</h1>
  <p style="color: rgba(255,255,255,0.6); font-size: 11pt; margin: 0;">Les d&#233;fis des auto-&#233;coles au Maroc</p>
</div>
<div class="cols">
  <div class="col-left">
    <div class="stat-box">
      <p style="color: #37DCF2; font-size: 20pt; font-weight: bold; margin: 0 0 2pt 0;">67%</p>
      <p style="color: rgba(255,255,255,0.8); font-size: 10pt; margin: 0;">Taux d'&#233;chec moyen &#224; l'examen th&#233;orique</p>
    </div>
    <div class="stat-box">
      <p style="color: #37DCF2; font-size: 20pt; font-weight: bold; margin: 0 0 2pt 0;">+3h</p>
      <p style="color: rgba(255,255,255,0.8); font-size: 10pt; margin: 0;">De pr&#233;paration manuelle par candidat par semaine</p>
    </div>
    <div class="stat-box">
      <p style="color: #37DCF2; font-size: 20pt; font-weight: bold; margin: 0 0 2pt 0;">40%</p>
      <p style="color: rgba(255,255,255,0.8); font-size: 10pt; margin: 0;">Candidats qui changent d'auto-&#233;cole apr&#232;s un &#233;chec</p>
    </div>
    <div class="stat-box">
      <p style="color: #C1272D; font-size: 12pt; font-weight: bold; margin: 0;">Permis Maroc r&#233;sout ces probl&#232;mes</p>
    </div>
  </div>
  <div class="col-right">
    <img src="../images/features.png" style="width: 290pt; height: 165pt; border-radius: 8pt; opacity: 0.9;" />
  </div>
</div>
</body>
</html>
